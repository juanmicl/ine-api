name: Release

# Publica en PyPI cuando se empuja un tag v* (p. ej. v0.1.0).
# Usa Trusted Publishing (OIDC) — sin tokens. Requiere configurar el
# "Trusted Publisher" en PyPI apuntando a este repo + workflow + environment.
# Ver: https://docs.pypi.org/trusted-publishers/
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # OIDC para Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi # debe coincidir con el "environment" del Trusted Publisher en PyPI
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
